# Railway deployment config — https://docs.railway.com/reference/config-as-code
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Required runtime env vars (set in Railway dashboard):
#   BACKEND_ORIGIN — server.mjs proxy target, e.g.
#                    https://sentry-backend-production-4a8f.up.railway.app
#   PORT           — provided by Railway
#
# DO NOT set VITE_API_BASE_URL. The browser talks SAME-ORIGIN; server.mjs
# proxies /api → BACKEND_ORIGIN so the httpOnly SameSite=Lax cookie is sent
# (ADR-0017). An absolute VITE_API_BASE_URL makes XHR cross-site and silently
# breaks admin login. Same-origin removes the cross-subdomain cookie problem.
